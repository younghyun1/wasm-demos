[build]
target = "wasm32-unknown-unknown"

[target.wasm32-unknown-unknown]
# WASM-specific rustflags for size optimization
rustflags = [
    # Enable all size optimizations
    "-C", "opt-level=z",
    # Single codegen unit
    "-C", "codegen-units=1",
    # Enable LTO
    "-C", "lto=true",
    # Strip debug info
    "-C", "debuginfo=0",
]

[unstable]
# Build std with same optimizations (requires nightly)
build-std = ["std", "panic_abort", "core", "alloc"]
build-std-features = ["panic_immediate_abort"]
